- name: Create application user
  ansible.builtin.user:
    name: "{{ app_user }}"
    shell: /sbin/nologin
    home: "{{ app_home }}"
    system: true

- name: Remove old application directory
  ansible.builtin.file:
    path: "{{ app_home }}"
    state: absent

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_home }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Download {{ component }} artifact
  ansible.builtin.get_url:
    url: "{{ artifact_url }}/{{ component }}-v3.zip"
    dest: "/tmp/{{ component }}.zip"
    mode: '0644'

- name: Extract {{ component }} artifact
  ansible.builtin.unarchive:
    src: "/tmp/{{ component }}.zip"
    dest: "{{ app_home }}"
    remote_src: yes
    owner: "{{ app_user }}"
    group: "{{ app_user }}"