- name: Install Java 17
  ansible.builtin.dnf:
    name: "{{ java_package }}"
    state: present

- name: Verify Java installation
  ansible.builtin.command:
    cmd: java -version
  register: java_version_output
  changed_when: false
  failed_when: false

- name: Print Java version
  ansible.builtin.debug:
    msg: "{{ java_version_output.stderr }}"